<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day1布局练习review</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Microsoft YaHei', sans-serif;
    }

    header {
      padding: 0 20px;
      align-items: center;
      background: #80a0bd;
      height: 60px;
      color: white;
      font-size: 18px;
      align-items: center;
      display: flex;
    }

    .container {
      display: flex;
      flex: 1;
    }

    aside {
      /* display: flex; */
      /* flex-direction: column; */
      width: 200px;
      background: #495f77;
      color: white;
      padding-top: 10px;
    }

    .menu-item {
      padding: 14px 24px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      line-height: 1.4;
      letter-spacing: 0.5px;
    }

    .menu-item:hover {
      background: #12202e;
      color: aquamarine;
      padding-left: 30px;
    }

    main {
      padding: 20px;
      background: #f3f3f4;
      flex: 1;
    }

    .content-box {
      background: white;
      padding: 20px;
      border-radius: 4px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    footer {
      margin-top: auto;
      height: 50px;
      background: black;
      color: white;
      align-items: center;
      justify-content: center;
      display: flex;
    }
  </style>
</head>

<body>
  <header>后台管理系统</header>
  <div class="container">
    <aside>
      <div class="menu-item">首页</div>
      <div class="menu-item">订单管理</div>
      <div class="menu-item">用户管理</div>
      <div class="menu-item">商品管理</div>
      <div class="menu-item">后台设置</div>
    </aside>
    <main>
      <div class="content-box">
        <h2>欢迎来到首页</h2>
        <br>
        <p>这里是主要内容区域</p>
      </div>
    </main>
  </div>
  <footer>底部栏</footer>
</body>

</html>
