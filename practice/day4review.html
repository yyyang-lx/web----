<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ending</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    body,
    html {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
    }

    nav {
      background: #5d74d1;
      color: white;
      padding: 0 20px;
      font-size: 20px;
    }

    .nav-list {
      display: flex;
      list-style: none;
    }

    .nav-list li a {
      text-decoration: none;
      display: block;
      padding: 18px 24px;
      transition: all 0.3s;
    }

    .nav-list li a:hover {
      background: greenyellow;
    }

    main {
      display: flex;
      margin: 20px auto;
      gap: 20px;
    }

    .card-item {
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      flex: 1;
      width: 320px;
      overflow: hidden;
    }

    .card-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-text {
      padding: 20px;
    }

    .card-text p {
      line-height: 1.6;
      font-size: 16px;
    }

    .card-text h4 {
      margin-bottom: 10px;
    }

    footer {
      display: flex;
      height: 50px;
      margin-top: auto;
      color: white;
      background: #5d74d1;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <nav>
    <ul class="nav-list">
      <li><a href="#">首页</a></li>
      <li><a href="#">后台管理</a></li>
      <li><a href="#">商品菜单</a></li>
      <li><a href="#">订单管理</a></li>
    </ul>
  </nav>
  <main>
    <div class="card-item">
      <img src="https://picsum.photos/600/300?1" alt="图片">
      <div class="card-text">
        <h4>第一张</h4>
        <p>这里是第1张图片，拥有随机更换的功能，不知道从哪里来，也不知道到哪里去。</p>
      </div>
    </div>
    <div class="card-item">
      <img src="https://picsum.photos/600/300?2" alt="图片">
      <div class="card-text">
        <h4>第二张</h4>
        <p>这里是第2张图片，拥有随机更换的功能，不知道从哪里来，也不知道到哪里去。</p>
      </div>
    </div>
    <div class="card-item">
      <img src="https://picsum.photos/600/300?3" alt="图片">
      <div class="card-text">
        <h4>第三张</h4>
        <p>这里是第3张图片，拥有随机更换的功能，不知道从哪里来，也不知道到哪里去。</p>
      </div>
    </div>
  </main>
  <footer>版权@</footer>
</body>

</html>
