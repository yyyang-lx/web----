<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航栏+多列图文卡片</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f5f5;
      font-family: 'Microsoft YaHei', sans-serif;
    }

    nav {

      background: #2f4050;
      padding: 0 30px;

    }

    .nav-list {
      display: flex;
      list-style: none;
    }

    .nav-list li a {
      /* block用法：让 <a> 链接变成 “块级盒子” */
      display: block;
      text-decoration: none;
      color: white;
      padding: 18px 24px;
      transition: all 0.3s;
    }

    .nav-list li a:hover {
      background: #42b983;
    }

    .container {
      display: flex;
      /* padding: 30px; */
      width: 1200px;
      /* auto:左右自动居中 */
      margin: 40px auto;
      /* gap位置：子元素间距 */
      gap: 20px;
    }

    .card-item {
      flex: 1;
      background: white;
      border-radius: 8px;
      /* overflow用法：把盒子 “多出来的部分切掉” */
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .card-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-text {
      padding: 20px;
    }

    .card-text h4 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #333;
    }

    .card-text p {
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <nav>
    <ul class="nav-list">
      <li><a href="#">首页</a></li>
      <li><a href="#">产品中心</a></li>
      <li><a href="#">资讯动态</a></li>
      <li><a href="#">关于我们</a></li>
    </ul>
  </nav>
  <div class="container">
    <div class="card-item">
      <img src="https://picsum.photos/600/300?1" alt="图片">
      <div class="card-text">
        <h4>精选内容一</h4>
        <p>这里是卡片描述文字，练习图文搭配和Flex多列布局。</p>
      </div>
    </div>
    <div class="card-item">
      <img src="https://picsum.photos/600/300?2" alt="图片">
      <div class="card-text">
        <h4>精选内容二</h4>
        <p>巩固margin、padding、圆角、阴影所有基础样式。</p>
      </div>
    </div>
    <div class="card-item">
      <img src="https://picsum.photos/600/300?3" alt="图片">
      <div class="card-text">
        <h4>精选内容三</h4>
        <p>看懂flex:1均分宽度，学会做网页商品展示区。</p>
      </div>
    </div>
  </div>
</body>

</html>
