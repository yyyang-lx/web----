<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>轮播图点击切换</title>
  <style>
    * {
      box-sizing: border-box;
    }

    .slider {
      width: 600px;
      overflow: hidden;
    }

    .slider-wrapper {
      width: 100%;
      height: 0;
      padding-top: 75%;
      /* 4:3 固定比例 */
      position: relative;
    }

    .slider-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      object-fit: cover;
      object-position: center;
    }

    .slider-footer {
      height: 80px;
      background-color: rgb(100, 67, 68);
      padding: 12px 12px 0 12px;
      position: relative;
    }

    .slider-footer .toggle {
      position: absolute;
      right: 0;
      top: 12px;
      display: flex;
    }

    .slider-footer .toggle button {
      margin-right: 12px;
      width: 28px;
      height: 28px;
      appearance: none;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }

    .slider-footer .toggle button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .slider-footer p {
      margin: 0;
      color: #fff;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .slider-indicator {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      align-items: center;
    }

    .slider-indicator li {
      width: 8px;
      height: 8px;
      margin: 4px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.4;
      cursor: pointer;
    }

    .slider-indicator li.active {
      width: 12px;
      height: 12px;
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="slider">
    <div class="slider-wrapper">
      <img src="./images/slider01.jpg" alt="" />
    </div>
    <div class="slider-footer">
      <p>对人类来说会不会太超前了？</p>
      <ul class="slider-indicator">
        <li class="active"></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
      <div class="toggle">
        <button class="prev">&lt;</button>
        <button class="next">&gt;</button>
      </div>
    </div>
  </div>
  <script>
    // 1. 初始数据
    const sliderData = [
      { url: './images/slider01.jpg', title: '对人类来说会不会太超前了？', color: 'rgb(100, 67, 68)' },
      { url: './images/slider02.jpg', title: '开启剑与雪的黑暗传说！', color: 'rgb(43, 35, 26)' },
      { url: './images/slider03.jpg', title: '真正的大厨出现了！', color: 'rgb(36, 31, 33)' },
      { url: './images/slider04.jpg', title: '雪色氛围感', color: 'rgb(139, 98, 66)' },
      { url: './images/slider05.jpg', title: '黑裙大波浪', color: 'rgb(67, 90, 92)' },
      { url: './images/slider06.jpg', title: '碧玉妆成一树高，万条垂下绿丝绦', color: 'rgb(166, 131, 143)' },
      { url: './images/slider07.jpg', title: '谁不想和小猫咪贴贴呢！', color: 'rgb(53, 29, 25)' },
      { url: './images/slider08.jpg', title: '黑裙轻垂，紫韵流淌', color: 'rgb(99, 72, 114)' },
    ]
    // 1.获取元素
    const img = document.querySelector('.slider-wrapper img')
    const p = document.querySelector('.slider-footer p')
    const footer = document.querySelector('.slider-footer')
    // 1.1右侧按钮业务
    const next = document.querySelector('.next')
    // 1.2注册点击事件
    let i = 0
    next.addEventListener('click', function () {
      i++
      // console.log(sliderData[i])
      if (i >= sliderData.length) {
        i = 0
      }
      comment()
    })
    // 2.左侧按钮业务
    //2.1获取左侧按钮
    const prev = document.querySelector('.prev')
    prev.addEventListener('click', function () {
      i--
      // console.log(sliderData[i])
      if (i < 0) {
        i = sliderData.length - 1
      }
      //调用函数
      comment()
    })
    function comment() {
      // 1.3渲染对应数据
      img.src = sliderData[i].url
      p.innerHTML = sliderData[i].title
      footer.style.backgroundColor = sliderData[i].color//不要忘了style
      // 1.4更换小圆点 先移除原有类名 当前li再添加active类
      document.querySelector('.slider-indicator .active').classList.remove('active')//不要忘了classList
      document.querySelector(`.slider-indicator li:nth-child(${i + 1})`).classList.add('active')
    }

    //3.自动播放模块
    let timeId = setInterval(function () {
      // 利用JS自动调用点击事件
      next.click()
    }, 1000)


    //4.鼠标经过大盒子，停止定时器
    const slider = document.querySelector('.slider')
    //注册点击事件
    slider.addEventListener('mouseenter', function () {
      clearInterval(timeId)
    })

    //5.鼠标离开大盒子，停止定时器
    //注册点击事件
    slider.addEventListener('mouseleave', function () {
      // 先关闭定时器
      clearInterval(timeId)
      // 在开启定时器
      timeId = setInterval(function () {
        // 利用JS自动调用点击事件
        next.click()
      }, 1000)
    })
  </script>
</body>

</html>
