<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>Day3 导航栏+多列图文卡片</title>
  <style>
    /* 全局万能重置（必写，巩固box-sizing） */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
    }

    /* ========== 1. 顶部导航栏 ========== */
    nav {
      background: #2f4050;
      padding: 0 30px;
    }

    /* Flex让导航横向排 */
    .nav-list {
      list-style: none;
      /* 去掉li默认小圆点 */
      display: flex;
    }

    .nav-list li a {
      display: block;
      color: #fff;
      text-decoration: none;
      /* 去掉下划线 */
      padding: 18px 24px;
      transition: all 0.3s;
    }

    .nav-list li a:hover {
      background: #42b983;
    }

    /* ========== 2. 页面容器 ========== */
    .container {
      width: 1200px;
      margin: 40px auto;
      /* 整个容器水平居中 */
      display: flex;
      gap: 20px;
      /* 卡片之间的间距（新版flex神器） */
    }

    /* ========== 3. 图文卡片 ========== */
    .card-item {
      flex: 1;
      /* 三张卡片自动均分宽度 */
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      /* 圆角裁掉图片边角 */
    }

    /* 图片撑满卡片，巩固width:100% */
    .card-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      /* 图片不变形 */
    }

    .card-text {
      padding: 20px;
      /* 内边距，巩固之前的知识点 */
    }

    .card-text h4 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #333;
    }

    .card-text p {
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <!-- 顶部导航 -->
  <nav>
    <ul class="nav-list">
      <li><a href="#">首页</a></li>
      <li><a href="#">资讯动态</a></li>
      <li><a href="#">产品中心</a></li>
      <li><a href="#">关于我们</a></li>
    </ul>
  </nav>

  <!-- 多列图文卡片 -->
  <div class="container">
    <div class="card-item">
      <img src="https://picsum.photos/600/300?1" alt="图片">
      <div class="card-text">
        <h4>精选内容一</h4>
        <p>这里是卡片描述文字，练习图文搭配和Flex多列布局。</p>
      </div>
    </div>
    <div class="card-item">
      <img src="https://picsum.photos/600/300?2" alt="图片">
      <div class="card-text">
        <h4>精选内容二</h4>
        <p>巩固margin、padding、圆角、阴影所有基础样式。</p>
      </div>
    </div>
    <div class="card-item">
      <img src="https://picsum.photos/600/300?3" alt="图片">
      <div class="card-text">
        <h4>精选内容三</h4>
        <p>看懂flex:1均分宽度，学会做网页商品展示区。</p>
      </div>
    </div>
  </div>
</body>

</html>
