<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day1布局练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: "Microsoft Yahei", sans-serif;
        }

        header {
            height: 60px;
            background: #80a0bd;
            color: white;
            padding: 0 20px;
            display: flex;
            align-items: center;
            font-size: 18px;
        }

        .container {
            flex: 1;
            display: flex;
        }

        /* 左侧菜单 */
        aside {
            width: 200px;
            background: #495f77;
            color: #fff;
            padding-top: 10px;
        }

        .memu-item {
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-item:hover {
            background: #001528;
            padding-left: 25px;
            color: #42b9ad;
        }

        /* 右侧内容 */
        main {
            flex: 1;
            padding: 20px;
            background: #f3f3f4;
        }

        .content-box {
            background: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* 底部 */
        footer {
            height: 50px;
            background: #333;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-top: auto;
        }
    </style>

</head>

<body>
    <header>后台管理系统</header>
    <div class="container">
        <aside>
            <div class="menu-item">首页</div>
            <div class="menu-item">用户管理</div>
            <div class="menu-item">商品管理</div>
            <div class="menu-item">订单管理</div>
            <div class="menu-item">系统设置</div>
        </aside>
        <main>
            <div class="content-box">
                <h2>欢迎来到首页</h2>
                <br>
                <p>这里是主内容区域</p>
            </div>
        </main>
    </div>
    <footer>底部版权</footer>
</body>

</html>
