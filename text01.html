<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day1布局练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 60px;
            background: #333;
            color: white;
            padding: 0 20px;
            display: flex;
            align-items: center;
        }

        .container {
            flex: 1;
            display: flex;
        }

        /* 左侧菜单 */
        aside {
            width: 200px;
            background: #f5f5f5;
            padding: 20px;
        }

        /* 右侧内容 */
        main {
            flex: 1;
            padding: 20px;
        }

        /* 底部 */
        footer {
            height: 50px;
            background: #333;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: auto;
        }
    </style>

</head>

<body>
    <header>顶部导航栏</header>
    <div class="container">
        <aside>左侧菜单</aside>
        <main>中间内容</main>
    </div>
    <footer>底部版权</footer>
</body>

</html>
